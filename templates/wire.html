{% if posts.len() > 11 %}
<ul class="space-y-3 text-sm text-gray-700 newspaper-tight newspaper-text" id="wire-list">
    {% for i in 11..posts.len() %}
    {% let post = posts[i] %}
    <li class="border-b border-dashed border-gray-300 pb-2 last:border-none last:pb-0">
        <a href="/post/{{ post.slug }}" class="flex flex-col gap-1 hover:text-black transition-colors">
            <span class="text-xs uppercase tracking-[0.3em] text-gray-500 newspaper-smallcaps">
                {{ post.metadata.date }}
            </span>
            <span class="font-semibold text-black newspaper-headline text-base">{{ post.metadata.title }}</span>
        </a>
    </li>
    {% endfor %}
</ul>
{% else %}
<p class="markdown-body text-xs text-gray-700 newspaper-tight" id="wire-list">
    Telegraph lines are quiet tonight. Drop the editor a note if you have a scoop worth printing.
</p>
{% endif %}
